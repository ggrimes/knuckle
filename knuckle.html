<!DOCTYPE html>
<html lang="en" data-theme="dark" data-cb="false">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNUCKLE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --panel:#161616; --border:#2a2a2a;
  --text:#e8e8e8; --muted:#555; --sub:#888;
  --key-bg:#252525; --key-text:#ccc;
  --accent:#e63946;
  --correct:#4a9e6b; --present:#c9933a; --absent:#2a2a2a;
  --absent-key:#1a1a1a; --absent-letter:#444;
  --modal-bg:rgba(0,0,0,0.78);
  --bar:#2a2a2a;
  --challenge:#7b61ff;
}
[data-theme="light"] {
  --bg:#f5f5f0; --panel:#ffffff; --border:#d0d0c8;
  --text:#1a1a1a; --muted:#aaa; --sub:#666;
  --key-bg:#d8d8d0; --key-text:#1a1a1a;
  --absent:#c8c8c0; --absent-key:#c0c0b8; --absent-letter:#888;
  --modal-bg:rgba(200,200,195,0.85);
  --bar:#c8c8c0;
}
[data-cb="true"] { --correct:#0072b2; --present:#e69f00; }
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Space Mono',monospace;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; overflow-x:hidden;
  transition:background .3s,color .3s;
}
#fx-canvas { position:fixed;inset:0;pointer-events:none;z-index:50; }
body::before {
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:100;opacity:.35;
}

/* ── Header ── */
header {
  width:100%;border-bottom:1px solid var(--border);
  padding:13px 16px;display:flex;align-items:center;
  justify-content:space-between;background:var(--panel);position:relative;
  transition:background .3s,border-color .3s;
}
.logo {
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;
  letter-spacing:.18em;color:var(--text);
  position:absolute;left:50%;transform:translateX(-50%);
}
.logo span { color:var(--accent); }
.header-left,.header-right { display:flex;gap:8px;align-items:center; }
.icon-btn {
  width:36px;height:36px;border:1px solid var(--border);
  background:var(--key-bg);color:var(--text);
  font-size:1rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .2s,border-color .2s,transform .1s;
  user-select:none;
}
.icon-btn:active { transform:scale(.88); }
.icon-btn.active { border-color:var(--accent);color:var(--accent); }
.icon-btn.challenge-active { border-color:var(--challenge);color:var(--challenge); }

/* ── Main ── */
main {
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:22px;padding:28px 20px 16px;
  width:100%;max-width:500px;
}

/* ── Mode badge ── */
#mode-badge {
  font-size:.58rem;letter-spacing:.25em;color:var(--accent);
  border:1px solid var(--accent);padding:3px 10px;
  text-transform:uppercase;display:none;
}
#mode-badge.show { display:block; }
#mode-badge.challenge-badge { color:var(--challenge);border-color:var(--challenge); }

/* ── Streak ── */
#streak-bar { display:flex;gap:20px;font-size:.65rem;letter-spacing:.1em;color:var(--sub); }
.streak-item { display:flex;flex-direction:column;align-items:center;gap:2px; }
.streak-num { font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--text);line-height:1; }
.streak-lbl { text-transform:uppercase;font-size:.52rem;letter-spacing:.15em;color:var(--muted); }

/* ── Grid ── */
#grid { display:flex;flex-direction:column;gap:6px; }
.row { display:flex;gap:6px; }
.tile {
  width:56px;height:56px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.9rem;
  color:var(--text);background:var(--panel);
  position:relative;overflow:hidden;will-change:transform;
  transition:border-color .15s,background .15s;
}
@keyframes letterPop {
  0%{transform:scale(.65) rotate(-5deg);opacity:0;}
  65%{transform:scale(1.18) rotate(1.5deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.tile.pop { animation:letterPop .2s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes shake {
  0%,100%{transform:translateX(0);}
  14%{transform:translateX(-8px) rotate(-1deg);}
  28%{transform:translateX(8px) rotate(1deg);}
  42%{transform:translateX(-5px);}
  57%{transform:translateX(5px);}
  71%{transform:translateX(-3px);}
  85%{transform:translateX(3px);}
}
.tile.shake { animation:shake .48s ease; }
@keyframes invalidFlash {
  0%,100%{border-color:var(--border);}
  30%{border-color:var(--accent);box-shadow:0 0 10px var(--accent);}
  60%{border-color:var(--accent);}
}
.tile.invalid { animation:shake .48s ease,invalidFlash .6s ease; }
.tile.correct { background:var(--correct);border-color:var(--correct);color:#fff; }
.tile.present { background:var(--present);border-color:var(--present);color:#fff; }
.tile.absent  { background:var(--absent);border-color:var(--absent);color:var(--absent-letter); }
@keyframes correctPulse {
  0%,100%{box-shadow:0 0 8px var(--correct);}
  50%{box-shadow:0 0 28px 6px var(--correct),inset 0 0 14px rgba(74,158,107,.3);}
}
.tile.correct.glowing { animation:correctPulse .9s ease 0s 2; }
@keyframes winBounce {
  0%,100%{transform:translateY(0) scale(1);}
  30%{transform:translateY(-18px) scale(1.12);}
  60%{transform:translateY(-7px) scale(1.04);}
}
.tile.win-bounce { animation:winBounce .65s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes lossDrop {
  0%{transform:translateY(0) rotate(0) scale(1);opacity:1;}
  30%{transform:translateY(-8px) rotate(-2deg) scale(1.05);}
  100%{transform:translateY(60px) rotate(4deg) scale(.9);opacity:.4;}
}
.tile.loss-drop { animation:lossDrop .6s cubic-bezier(.4,0,.6,1) both; }
.tile::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(transparent 35%,rgba(255,255,255,.09) 50%,transparent 65%);
  transform:translateY(-120%);pointer-events:none;
}
.tile.scan::after { animation:scanline .45s ease .1s forwards; }
@keyframes scanline { from{transform:translateY(-120%);}to{transform:translateY(120%);} }

/* ── Toast ── */
#toast {
  position:fixed;top:76px;left:50%;
  transform:translateX(-50%) translateY(-14px);
  background:var(--text);color:var(--bg);
  padding:9px 20px;font-size:.72rem;letter-spacing:.15em;
  text-transform:uppercase;font-weight:700;
  opacity:0;transition:opacity .2s,transform .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:200;white-space:nowrap;max-width:90vw;
  overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.error{background:var(--accent);color:#fff;}

/* ── Keyboard ── */
#keyboard{display:flex;flex-direction:column;gap:5px;align-items:center;width:100%;}
.kb-row{display:flex;gap:4px;}
.key {
  height:50px;min-width:34px;padding:0 5px;
  background:var(--key-bg);color:var(--key-text);border:1px solid var(--border);
  font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .28s,color .28s,border-color .28s,box-shadow .28s,transform .1s;
  letter-spacing:.05em;text-transform:uppercase;user-select:none;
}
.key:active{transform:scale(.9);}
.key.wide{min-width:54px;font-size:.58rem;}
.key.correct{background:var(--correct);border-color:var(--correct);color:#fff;box-shadow:0 0 10px color-mix(in srgb,var(--correct) 50%,transparent);}
.key.present{background:var(--present);border-color:var(--present);color:#fff;box-shadow:0 0 10px color-mix(in srgb,var(--present) 50%,transparent);}
.key.absent{background:var(--absent-key);border-color:var(--absent-key);color:var(--absent-letter);}
@keyframes keyPop{0%{transform:scale(1);}45%{transform:scale(1.22);}100%{transform:scale(1);}}
.key.just-revealed{animation:keyPop .32s cubic-bezier(.34,1.56,.64,1);}

/* ── End screen ── */
#end-screen{display:none;flex-direction:column;align-items:center;gap:14px;text-align:center;}
#end-screen.show{display:flex;animation:endIn .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes endIn{from{opacity:0;transform:translateY(24px) scale(.92);}to{opacity:1;transform:translateY(0) scale(1);}}
.end-label{font-size:.62rem;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;}
.end-word{font-family:'Bebas Neue',sans-serif;font-size:3.8rem;letter-spacing:.2em;color:var(--accent);line-height:1;animation:wordGlow 2s ease infinite;}
@keyframes wordGlow{0%,100%{text-shadow:0 0 20px rgba(230,57,70,.5);}50%{text-shadow:0 0 60px rgba(230,57,70,.9),0 0 100px rgba(230,57,70,.4);}}
.end-msg{font-size:.72rem;color:var(--sub);letter-spacing:.08em;max-width:280px;line-height:1.7;}
.end-actions{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;justify-content:center;}
.end-btn{padding:9px 18px;font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:transform .1s,box-shadow .2s;}
.end-btn:active{transform:scale(.94);}
.btn-share{background:var(--correct);border-color:var(--correct);color:#fff;}
.btn-replay{background:transparent;border-color:var(--accent);color:var(--accent);}
.btn-challenge-again{background:transparent;border-color:var(--challenge);color:var(--challenge);}
.divider{width:40px;height:1px;background:var(--border);}

/* ── Modal base ── */
.modal-overlay {
  position:fixed;inset:0;background:var(--modal-bg);
  z-index:300;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
  backdrop-filter:blur(5px);
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal {
  background:var(--panel);border:1px solid var(--border);
  padding:26px 26px 22px;width:min(360px,94vw);
  transform:translateY(20px) scale(.96);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.18em;color:var(--text);margin-bottom:18px;text-align:center;}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;transition:color .15s;}
.modal-close:hover{color:var(--text);}

/* ── Stats modal ── */
.stat-row{display:flex;justify-content:center;gap:18px;margin-bottom:18px;}
.stat-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--text);line-height:1;}
.stat-l{font-size:.52rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;text-align:center;max-width:52px;}
.chart-title{font-size:.56rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;text-align:center;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:.65rem;}
.bar-label{color:var(--sub);width:10px;text-align:right;}
.bar-track{flex:1;height:18px;background:var(--bar);position:relative;overflow:hidden;}
.bar-fill{height:100%;background:var(--correct);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-family:'Space Mono',monospace;font-size:.6rem;color:#fff;font-weight:700;min-width:18px;transition:width .6s cubic-bezier(.34,1,.64,1);}
.bar-fill.current{background:var(--accent);}

/* ── Challenge modal ── */
.challenge-modal .modal{border-color:var(--challenge);}
.challenge-modal .modal-title{color:var(--challenge);}

/* tabs */
.ch-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);}
.ch-tab{flex:1;padding:9px;font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--muted);border:none;transition:background .2s,color .2s;}
.ch-tab.active{background:var(--challenge);color:#fff;}

/* SET panel */
#ch-set-panel,#ch-enter-panel{display:none;}
#ch-set-panel.active,#ch-enter-panel.active{display:block;}

.ch-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.ch-word-display{
  display:flex;gap:6px;justify-content:center;margin-bottom:16px;
}
.ch-tile{
  width:48px;height:48px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--text);
  background:var(--panel);transition:border-color .15s;
}
.ch-tile.active-ch{border-color:var(--challenge);box-shadow:0 0 8px color-mix(in srgb,var(--challenge) 40%,transparent);}
.ch-tile.filled{border-color:var(--sub);}

.ch-keyboard{display:flex;flex-direction:column;gap:4px;align-items:center;margin-bottom:14px;}
.ch-kb-row{display:flex;gap:3px;}
.ch-key{
  height:40px;min-width:28px;padding:0 4px;
  background:var(--key-bg);color:var(--key-text);border:1px solid var(--border);
  font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s;letter-spacing:.04em;text-transform:uppercase;user-select:none;
}
.ch-key:active{transform:scale(.88);}
.ch-key.wide{min-width:44px;font-size:.5rem;}

.ch-error{font-size:.62rem;color:var(--accent);letter-spacing:.1em;min-height:18px;margin-bottom:10px;text-align:center;}

/* code display */
.code-box{
  background:var(--bg);border:1px solid var(--challenge);
  padding:14px;text-align:center;margin-bottom:14px;
  display:none;
}
.code-box.show{display:block;animation:endIn .4s ease both;}
.code-label{font-size:.52rem;letter-spacing:.25em;color:var(--challenge);text-transform:uppercase;margin-bottom:6px;}
.code-value{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.3em;
  color:var(--text);word-break:break-all;
}
.code-hint{font-size:.52rem;color:var(--muted);letter-spacing:.1em;margin-top:6px;}

/* ENTER panel */
.ch-input-wrap{display:flex;gap:8px;margin-bottom:12px;}
.ch-code-input{
  flex:1;background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-family:'Space Mono',monospace;font-size:.85rem;
  padding:10px 12px;letter-spacing:.2em;text-transform:uppercase;
  outline:none;transition:border-color .2s;
}
.ch-code-input:focus{border-color:var(--challenge);}
.ch-code-input::placeholder{font-size:.65rem;letter-spacing:.1em;color:var(--muted);}
.ch-go-btn{
  padding:10px 16px;background:var(--challenge);border:1px solid var(--challenge);
  color:#fff;font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  transition:transform .1s,box-shadow .2s;
}
.ch-go-btn:active{transform:scale(.94);}
.ch-go-btn:hover{box-shadow:0 0 14px color-mix(in srgb,var(--challenge) 50%,transparent);}

.full-btn{
  width:100%;padding:10px;background:var(--challenge);border:1px solid var(--challenge);
  color:#fff;font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  transition:transform .1s,box-shadow .2s;margin-top:2px;
}
.full-btn:active{transform:scale(.97);}
.full-btn.copy-btn{background:transparent;border-color:var(--challenge);color:var(--challenge);margin-top:8px;}

/* cb label */
#cb-label{font-size:.52rem;letter-spacing:.2em;color:var(--present);text-transform:uppercase;display:none;}
[data-cb="true"] #cb-label{display:block;}
</style>
</head>
<body>
<canvas id="fx-canvas"></canvas>
<header>
  <div class="header-left">
    <button class="icon-btn" id="btn-cb"    title="Colour blind mode" aria-label="Colour blind mode">◑</button>
    <button class="icon-btn" id="btn-theme" title="Toggle theme"       aria-label="Toggle theme">☀</button>
  </div>
  <div class="logo">K<span>N</span>UCKLE</div>
  <div class="header-right">
    <button class="icon-btn" id="btn-challenge" title="Challenge a friend" aria-label="Challenge a friend">⚔</button>
    <button class="icon-btn" id="btn-stats"     title="Statistics"         aria-label="Statistics">▦</button>
  </div>
</header>

<div id="toast" role="alert" aria-live="assertive"></div>

<main>
  <div id="mode-badge"></div>
  <div id="cb-label">colour blind on</div>

  <div id="streak-bar">
    <div class="streak-item"><div class="streak-num" id="s-played">0</div><div class="streak-lbl">Played</div></div>
    <div class="streak-item"><div class="streak-num" id="s-streak">0</div><div class="streak-lbl">Streak</div></div>
    <div class="streak-item"><div class="streak-num" id="s-best">0</div><div class="streak-lbl">Best</div></div>
    <div class="streak-item"><div class="streak-num" id="s-pct">0%</div><div class="streak-lbl">Win %</div></div>
  </div>

  <div id="grid"></div>

  <div id="end-screen">
    <div class="end-label" id="end-label">The word was</div>
    <div class="end-word"  id="end-word"></div>
    <div class="end-msg"   id="end-msg"></div>
    <div class="end-actions">
      <button class="end-btn btn-share"          id="btn-share">Share 🟩</button>
      <button class="end-btn btn-replay"          id="btn-replay"          style="display:none">Play Again</button>
      <button class="end-btn btn-challenge-again" id="btn-challenge-again" style="display:none">Set New Challenge ⚔</button>
    </div>
  </div>

  <div id="keyboard"></div>
</main>

<!-- Stats Modal -->
<div class="modal-overlay" id="stats-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="stats-close">✕</button>
    <div class="modal-title">Statistics</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n" id="m-played">0</div><div class="stat-l">Played</div></div>
      <div class="stat-box"><div class="stat-n" id="m-wins">0</div><div class="stat-l">Wins</div></div>
      <div class="stat-box"><div class="stat-n" id="m-streak">0</div><div class="stat-l">Streak</div></div>
      <div class="stat-box"><div class="stat-n" id="m-best">0</div><div class="stat-l">Best</div></div>
    </div>
    <div class="chart-title">Guess Distribution</div>
    <div id="dist-chart"></div>
  </div>
</div>

<!-- Challenge Modal -->
<div class="modal-overlay challenge-modal" id="challenge-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="challenge-close">✕</button>
    <div class="modal-title">⚔ Challenge</div>

    <div class="ch-tabs">
      <button class="ch-tab active" id="tab-set">Set a Word</button>
      <button class="ch-tab"        id="tab-enter">Enter a Code</button>
    </div>

    <!-- SET panel -->
    <div id="ch-set-panel" class="active">
      <div class="ch-label">Type your secret word</div>
      <div class="ch-word-display" id="ch-word-display"></div>
      <div class="ch-keyboard" id="ch-keyboard"></div>
      <div class="ch-error" id="ch-error"></div>

      <div class="code-box" id="code-box">
        <div class="code-label">Challenge Code</div>
        <div class="code-value" id="code-value"></div>
        <div class="code-hint">Share this code — they'll enter it to guess your word</div>
      </div>

      <button class="full-btn" id="btn-gen-code">Generate Code</button>
      <button class="full-btn copy-btn" id="btn-copy-code" style="display:none">Copy Code to Clipboard</button>
    </div>

    <!-- ENTER panel -->
    <div id="ch-enter-panel">
      <div class="ch-label">Paste a challenge code</div>
      <div class="ch-input-wrap">
        <input class="ch-code-input" id="ch-code-input" placeholder="Enter code…" maxlength="32" spellcheck="false" autocomplete="off">
        <button class="ch-go-btn" id="btn-load-code">Go</button>
      </div>
      <div class="ch-error" id="ch-enter-error"></div>
      <button class="full-btn" id="btn-start-challenge">Start Challenge</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
//  ENCODE / DECODE  (simple XOR + base36, no crypto needed)
//  Key is fixed — obscures the word from casual URL inspection
// ════════════════════════════════════════════════════════
const SECRET_KEY = [0x4B,0x4E,0x55,0x43,0x4B]; // "KNUCK"

function encodeWord(word) {
  // XOR each char code with rotating key, then pack as 4-digit hex each = 20 chars
  const w = word.toUpperCase();
  let out = '';
  for (let i = 0; i < w.length; i++) {
    const xored = w.charCodeAt(i) ^ SECRET_KEY[i % SECRET_KEY.length];
    out += xored.toString(16).padStart(2,'0');
  }
  // add a 2-char checksum (sum of raw chars mod 256)
  const checksum = w.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 256;
  out += checksum.toString(16).padStart(2,'0');
  return out.toUpperCase();
}

function decodeCode(code) {
  const c = code.trim().toUpperCase();
  if (c.length !== 12) return null; // 5*2 + 2 checksum
  try {
    let word = '';
    for (let i = 0; i < 5; i++) {
      const byte = parseInt(c.slice(i*2, i*2+2), 16);
      const char = String.fromCharCode(byte ^ SECRET_KEY[i % SECRET_KEY.length]);
      if (!/[A-Z]/.test(char)) return null;
      word += char;
    }
    // verify checksum
    const checksum = word.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 256;
    const givenChecksum = parseInt(c.slice(10,12), 16);
    if (checksum !== givenChecksum) return null;
    return word;
  } catch { return null; }
}

const canvas=document.getElementById('fx-canvas'),ctx=canvas.getContext('2d');
let particles=[],animId=null;
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

function spawnP(x,y,color,count,opts={}){
  for(let i=0;i<count;i++){
    const a=(opts.angle||0)+(Math.random()-.5)*(opts.spread||Math.PI*2);
    const sp=(opts.min||2)+Math.random()*(opts.max||7);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp+(opts.yb||0),
      alpha:1,size:(opts.sz||3)+Math.random()*(opts.szv||5),color,
      shape:Math.random()>.45?'rect':'circle',rot:Math.random()*Math.PI*2,
      rotS:(Math.random()-.5)*.35,grav:(opts.grav||.2)+Math.random()*.08,
      decay:(opts.decay||.016)+Math.random()*.012});
  }
  if(!animId)loopP();
}
function loopP(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.alpha>.01);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.985;
    p.alpha-=p.decay;p.rot+=p.rotS;
    ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    if(p.shape==='rect')ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.55);
    else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  if(particles.length)animId=requestAnimationFrame(loopP);
  else{animId=null;ctx.clearRect(0,0,canvas.width,canvas.height);}
}
function burstFromTile(tile,st){
  const r=tile.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const C=getComputedStyle(document.documentElement);
  if(st==='correct'){
    spawnP(cx,cy,C.getPropertyValue('--correct').trim()||'#4a9e6b',22,{min:2,max:8,sz:4,szv:8});
    spawnP(cx,cy,'#a8f0c0',10,{min:1,max:5,sz:2,szv:3});
    spawnP(cx,cy,'#fff',5,{min:3,max:10,sz:2,szv:2});
  } else if(st==='present'){
    spawnP(cx,cy,C.getPropertyValue('--present').trim()||'#c9933a',10,{min:1,max:5,sz:3,szv:4});
    spawnP(cx,cy,'#f0d090',5,{min:1,max:4,sz:2,szv:2});
  } else {
    spawnP(cx,cy,'#555',4,{min:1,max:3,sz:2,szv:2,decay:.05});
  }
}
function bigWinBurst(tileEls){
  tileEls.forEach((tile,i)=>setTimeout(()=>{
    const r=tile.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
    const C=getComputedStyle(document.documentElement);
    spawnP(cx,cy,C.getPropertyValue('--correct').trim()||'#4a9e6b',45,{min:3,max:12,sz:4,szv:8});
    spawnP(cx,cy,'#a8f0c0',25,{min:2,max:8,sz:2,szv:4});
    spawnP(cx,cy,'#fff',15,{min:4,max:14,sz:2,szv:3});
    spawnP(cx,cy,'#e63946',10,{min:2,max:7,sz:3,szv:5});
  },i*110));
}
function screenFlash(color,opacity=.18){
  const el=document.createElement('div');
  Object.assign(el.style,{position:'fixed',inset:0,background:color,opacity,
    pointerEvents:'none',zIndex:60,transition:'opacity .55s ease'});
  document.body.appendChild(el);
  requestAnimationFrame(()=>{el.style.opacity=0;setTimeout(()=>el.remove(),700);});
}

const gridEl=document.getElementById('grid');
let tiles=[];
function buildGrid(){
  gridEl.innerHTML='';tiles=[];
  for(let r=0;r<MAX_GUESSES;r++){
    const row=document.createElement('div');row.className='row';
    tiles[r]=[];
    for(let c=0;c<WL;c++){
      const t=document.createElement('div');t.className='tile';
      row.appendChild(t);tiles[r][c]=t;
    }
    gridEl.appendChild(row);
  }
}
buildGrid();

const KB_ROWS=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
const kbEl=document.getElementById('keyboard');
let keyMap={};
function buildKeyboard(){
  kbEl.innerHTML='';keyMap={};
  KB_ROWS.forEach(row=>{
    const rowEl=document.createElement('div');rowEl.className='kb-row';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k.length>1?' wide':'');
      btn.textContent=k;btn.dataset.key=k;
      btn.addEventListener('click',()=>handleKey(k));
      rowEl.appendChild(btn);keyMap[k]=btn;
    });
    kbEl.appendChild(rowEl);
  });
}
buildKeyboard();

let toastTimer;
function showToast(msg,ms=1900,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.toggle('error',err);
  t.classList.remove('show');void t.offsetWidth;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}

//  INPUT
// ════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.getElementById('stats-modal').classList.contains('open'))return;
  if(document.getElementById('challenge-modal').classList.contains('open'))return;
  if(state.over)return;
  if(e.key==='Enter')handleKey('ENTER');
  else if(e.key==='Backspace')handleKey('⌫');
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
});

function handleKey(k){
  if(state.over)return;
  if(k==='⌫')deleteLetter();
  else if(k==='ENTER')submitGuess();
  else if(/^[A-Z]$/.test(k)&&state.col<WL)addLetter(k);
}
function addLetter(l){
  if(state.col>=WL)return;
  state.guess[state.col]=l;
  const tile=tiles[state.row][state.col];
  tile.textContent=l;
  tile.classList.remove('pop');void tile.offsetWidth;tile.classList.add('pop');
  state.col++;
}
function deleteLetter(){
  if(!state.col)return;
  state.col--;state.guess[state.col]=null;
  const tile=tiles[state.row][state.col];
  tile.textContent='';tile.classList.remove('pop');
}
function submitGuess(){
  if(state.col<WL){showToast('Not enough letters',1600,true);invalidRow(state.row);return;}
  const guess=state.guess.join('');
  if(!VALID_WORDS.has(guess)){showToast(`"${guess}" — not in word list`,2000,true);invalidRow(state.row);return;}
  const result=evaluate(guess);
  state.guessResults.push({guess,result});
  revealRow(state.row,result,guess);
}
function evaluate(guess){
  const res=Array(WL).fill('absent');
  const wa=state.word.split(''),ga=guess.split(''),used=Array(WL).fill(false);
  for(let i=0;i<WL;i++)if(ga[i]===wa[i]){res[i]='correct';used[i]=true;}
  for(let i=0;i<WL;i++){
    if(res[i]==='correct')continue;
    for(let j=0;j<WL;j++){
      if(!used[j]&&ga[i]===wa[j]&&res[j]!=='correct'){res[i]='present';used[j]=true;break;}
    }
  }
  return res;
}

// ════════════════════════════════════════════════════════
//  REVEAL
// ════════════════════════════════════════════════════════
function revealRow(row,result,guess){
  const HALF=230,STAGGER=310;
  result.forEach((st,i)=>{
    const tile=tiles[row][i];
    setTimeout(()=>{
      tile.style.transition=`transform ${HALF}ms cubic-bezier(.4,0,.6,1)`;
      tile.style.transform='rotateX(-90deg) scaleY(.6)';
      setTimeout(()=>{
        tile.classList.add(st,'scan');
        tile.style.transition=`transform ${HALF}ms cubic-bezier(.2,1,.4,1)`;
        tile.style.transform='rotateX(0deg) scaleY(1)';
        burstFromTile(tile,st);
        updateKey(guess[i],st);
        if(st==='correct')setTimeout(()=>tile.classList.add('glowing'),HALF);
      },HALF);
    },i*STAGGER);
  });

  const done=(WL-1)*STAGGER+HALF*2+120;
  setTimeout(()=>{
    const won=result.every(r=>r==='correct');
    state.row++;state.guess=[];state.col=0;
    if(won){
      state.over=true;
      if(state.mode!=='challenge'){
        stats.played++;stats.wins++;stats.streak++;
        if(stats.streak>stats.best)stats.best=stats.streak;
        stats.dist[String(state.row)]=(stats.dist[String(state.row)]||0)+1;
        saveStats();updateStreakBar();
      }
      const msgs=['INSANE!','SAVAGE!','CLEAN!','KNUCKLES UP!','SOLID.','LUCKY...'];
      tiles[row].forEach((t,i)=>setTimeout(()=>t.classList.add('win-bounce'),i*75));
      setTimeout(()=>{
        bigWinBurst(tiles[row]);screenFlash('#4a9e6b',.18);
        showToast(msgs[Math.min(state.row-1,5)],2400);
        setTimeout(()=>showEndScreen(true),1900);
      },550);
    } else if(state.row>=MAX_GUESSES){
      state.over=true;
      if(state.mode!=='challenge'){
        stats.played++;stats.streak=0;saveStats();updateStreakBar();
      }
      setTimeout(()=>dramaticLoss(()=>showEndScreen(false)),300);
    }
  },done);
}

function invalidRow(row){
  tiles[row].forEach(t=>{
    t.classList.remove('invalid','shake');void t.offsetWidth;
    t.classList.add('invalid');
    t.addEventListener('animationend',()=>t.classList.remove('invalid','shake'),{once:true});
  });
}
function dramaticLoss(cb){
  screenFlash('#e63946',.2);
  tiles.forEach((rowTiles,ri)=>rowTiles.forEach((tile,ci)=>
    setTimeout(()=>tile.classList.add('loss-drop'),ri*60+ci*30)));
  setTimeout(cb,900);
}

const kPrio={correct:3,present:2,absent:1},kState={};
function updateKey(letter,st){
  if(!kPrio[st]||(kState[letter]&&kPrio[kState[letter]]>=kPrio[st]))return;
  kState[letter]=st;
  const btn=keyMap[letter];if(!btn)return;
  btn.classList.remove('correct','present','absent','just-revealed');
  btn.classList.add(st);void btn.offsetWidth;btn.classList.add('just-revealed');
  btn.addEventListener('animationend',()=>btn.classList.remove('just-revealed'),{once:true});
}

//  END SCREEN
// ════════════════════════════════════════════════════════
function showEndScreen(won){
  gridEl.style.display='none';
  const es=document.getElementById('end-screen');es.classList.add('show');
  document.getElementById('end-label').textContent=won?'You got it!':'The word was';
  document.getElementById('end-word').textContent=state.word;

  const isChallenge = state.mode==='challenge';
  const isEndless   = state.mode==='endless';

  document.getElementById('end-msg').textContent=won
    ?(isChallenge?`Solved in ${state.row} ${state.row===1?'guess':'guesses'}! Challenge complete.`
      :`Solved in ${state.row} ${state.row===1?'guess':'guesses'}.${isEndless?' Play again below!':' Come back tomorrow.'}`)
    :(isChallenge?`The word was ${state.word}. Better luck next time!`
      :`The answer was ${state.word}.${isEndless?' Try again!':' Come back tomorrow.'}`);

  document.getElementById('btn-replay').style.display         = isEndless?'block':'none';
  document.getElementById('btn-challenge-again').style.display= isChallenge?'block':'none';
}

//  SHARE
// ════════════════════════════════════════════════════════
const EMOJIS={correct:{normal:'🟩',cb:'🟦'},present:{normal:'🟨',cb:'🟧'},absent:{normal:'⬛',cb:'⬛'}};
document.getElementById('btn-share').addEventListener('click',()=>{
  const cb=document.documentElement.dataset.cb==='true';
  const lines=state.guessResults.map(({result})=>result.map(r=>EMOJIS[r][cb?'cb':'normal']).join(''));
  const won=state.guessResults.at(-1)?.result.every(r=>r==='correct');
  const score=won?state.guessResults.length:'X';
  const modeTag=state.mode==='challenge'?' ⚔':state.mode==='endless'?' ∞':'';
  const text=`KNUCKLE${modeTag} ${score}/${MAX_GUESSES}\n\n${lines.join('\n')}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('btn-share');
    const orig=btn.textContent;btn.textContent='Copied!';
    setTimeout(()=>btn.textContent=orig,1800);
  }).catch(()=>showToast('Copy failed',1500,true));
});

function setBadge(text,cls=''){
  const b=document.getElementById('mode-badge');
  b.textContent=text;
  b.className='';
  if(text){b.classList.add('show');if(cls)b.classList.add(cls);}
}
function resetGame(word,mode){
  state={word:word.toUpperCase(),mode,row:0,col:0,guess:[],over:false,guessResults:[]};
  Object.keys(kState).forEach(k=>delete kState[k]);
  buildGrid();buildKeyboard();
  document.getElementById('end-screen').classList.remove('show');
  gridEl.style.display='flex';
  document.getElementById('btn-challenge').classList.toggle('challenge-active', mode==='challenge');
}

// Endless
document.getElementById('btn-replay').addEventListener('click',()=>{
  resetGame(ENDLESS_POOL[Math.floor(Math.random()*ENDLESS_POOL.length)],'endless');
  setBadge('endless mode');
});
document.getElementById('btn-challenge-again').addEventListener('click',()=>openChallengeModal());

// ════════════════════════════════════════════════════════
//  STREAK BAR
// ════════════════════════════════════════════════════════
function updateStreakBar(){
  document.getElementById('s-played').textContent=stats.played;
  document.getElementById('s-streak').textContent=stats.streak;
  document.getElementById('s-best').textContent=stats.best;
  const pct=stats.played?Math.round(stats.wins/stats.played*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
}
updateStreakBar();

// ════════════════════════════════════════════════════════
//  STATS MODAL
// ════════════════════════════════════════════════════════
function openStats(){
  document.getElementById('m-played').textContent=stats.played;
  document.getElementById('m-wins').textContent=stats.wins;
  document.getElementById('m-streak').textContent=stats.streak;
  document.getElementById('m-best').textContent=stats.best;
  const chart=document.getElementById('dist-chart');chart.innerHTML='';
  const maxVal=Math.max(1,...Object.values(stats.dist));
  const lastWon=state.over&&state.guessResults.at(-1)?.result.every(r=>r==='correct');
  const lastRow=lastWon?String(state.row):'';
  for(let i=1;i<=6;i++){
    const val=stats.dist[i]||0,pct=Math.max(8,Math.round(val/maxVal*100));
    const row=document.createElement('div');row.className='bar-row';
    row.innerHTML=`<div class="bar-label">${i}</div><div class="bar-track"><div class="bar-fill${String(i)===lastRow?' current':''}" style="width:0%">${val}</div></div>`;
    chart.appendChild(row);
    setTimeout(()=>row.querySelector('.bar-fill').style.width=pct+'%',50);
  }
  document.getElementById('stats-modal').classList.add('open');
}
function closeStats(){document.getElementById('stats-modal').classList.remove('open');}
document.getElementById('btn-stats').addEventListener('click',openStats);
document.getElementById('stats-close').addEventListener('click',closeStats);
document.getElementById('stats-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeStats();});

// ════════════════════════════════════════════════════════
//  CHALLENGE MODAL
// ════════════════════════════════════════════════════════
let chWord = [];  // letters typed in SET panel
let generatedCode = '';

function openChallengeModal(){
  resetChSetPanel();
  switchTab('set');
  document.getElementById('challenge-modal').classList.add('open');
}
function closeChallengeModal(){document.getElementById('challenge-modal').classList.remove('open');}
document.getElementById('btn-challenge').addEventListener('click',openChallengeModal);
document.getElementById('challenge-close').addEventListener('click',closeChallengeModal);
document.getElementById('challenge-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeChallengeModal();});

// Tabs
function switchTab(which){
  document.getElementById('tab-set').classList.toggle('active',which==='set');
  document.getElementById('tab-enter').classList.toggle('active',which==='enter');
  document.getElementById('ch-set-panel').classList.toggle('active',which==='set');
  document.getElementById('ch-enter-panel').classList.toggle('active',which==='enter');
  if(which==='enter'){
    document.getElementById('ch-code-input').value='';
    document.getElementById('ch-enter-error').textContent='';
    document.getElementById('btn-start-challenge').disabled=true;
    loadedChallengeWord='';
  }
}
document.getElementById('tab-set').addEventListener('click',()=>switchTab('set'));
document.getElementById('tab-enter').addEventListener('click',()=>switchTab('enter'));

// ── SET panel ──────────────────────────────────────────
function buildChWordDisplay(){
  const d=document.getElementById('ch-word-display');d.innerHTML='';
  for(let i=0;i<WL;i++){
    const t=document.createElement('div');
    t.className='ch-tile'+(i===chWord.length?' active-ch':chWord[i]?' filled':'');
    t.textContent=chWord[i]||'';
    d.appendChild(t);
  }
}

function buildChKeyboard(){
  const el=document.getElementById('ch-keyboard');el.innerHTML='';
  KB_ROWS.forEach(row=>{
    const rowEl=document.createElement('div');rowEl.className='ch-kb-row';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='ch-key'+(k.length>1?' wide':'');
      btn.textContent=k;
      btn.addEventListener('click',()=>handleChKey(k));
      rowEl.appendChild(btn);
    });
    el.appendChild(rowEl);
  });
}

function handleChKey(k){
  if(k==='⌫'){
    if(chWord.length)chWord.pop();
  } else if(k==='ENTER'){
    validateAndGenerate();return;
  } else if(/^[A-Z]$/.test(k)&&chWord.length<WL){
    chWord.push(k);
  }
  document.getElementById('ch-error').textContent='';
  document.getElementById('code-box').classList.remove('show');
  document.getElementById('btn-copy-code').style.display='none';
  document.getElementById('btn-gen-code').style.display='block';
  buildChWordDisplay();
}

function validateAndGenerate(){
  const word=chWord.join('');
  if(word.length<WL){
    document.getElementById('ch-error').textContent='Word must be 5 letters.';return;
  }
  if(!VALID_WORDS.has(word)){
    document.getElementById('ch-error').textContent=`"${word}" isn't in the word list.`;
    // shake tiles
    document.querySelectorAll('.ch-tile').forEach(t=>{
      t.classList.remove('shake');void t.offsetWidth;t.classList.add('shake');
      t.addEventListener('animationend',()=>t.classList.remove('shake'),{once:true});
    });
    return;
  }
  document.getElementById('ch-error').textContent='';
  generatedCode=encodeWord(word);
  document.getElementById('code-value').textContent=formatCode(generatedCode);
  document.getElementById('code-box').classList.add('show');
  document.getElementById('btn-gen-code').style.display='none';
  document.getElementById('btn-copy-code').style.display='block';
}

function formatCode(code){
  // format as XXXX-XXXX-XXXX for readability
  return code.match(/.{1,4}/g).join('-');
}
function stripFormat(code){ return code.replace(/-/g,'').trim(); }

document.getElementById('btn-gen-code').addEventListener('click',validateAndGenerate);
document.getElementById('btn-copy-code').addEventListener('click',()=>{
  const display=document.getElementById('code-value').textContent;
  navigator.clipboard.writeText(display).then(()=>{
    const btn=document.getElementById('btn-copy-code');
    btn.textContent='Copied! ✓';
    setTimeout(()=>btn.textContent='Copy Code to Clipboard',2000);
  });
});

function resetChSetPanel(){
  chWord=[];generatedCode='';
  document.getElementById('ch-error').textContent='';
  document.getElementById('code-box').classList.remove('show');
  document.getElementById('btn-copy-code').style.display='none';
  document.getElementById('btn-gen-code').style.display='block';
  buildChWordDisplay();
  buildChKeyboard();
}

// ── ENTER panel ────────────────────────────────────────
let loadedChallengeWord='';

document.getElementById('ch-code-input').addEventListener('input',e=>{
  const raw=stripFormat(e.target.value);
  const decoded=decodeCode(raw);
  const errEl=document.getElementById('ch-enter-error');
  const goBtn=document.getElementById('btn-start-challenge');

  if(!raw){errEl.textContent='';loadedChallengeWord='';goBtn.disabled=true;return;}
  if(!decoded){
    errEl.textContent='Invalid code — check and try again.';
    loadedChallengeWord='';goBtn.disabled=true;
  } else {
    errEl.textContent=`✓ Valid code — ready to play!`;
    errEl.style.color='var(--correct)';
    loadedChallengeWord=decoded;
    goBtn.disabled=false;
  }
});
// Reset error color on each input
document.getElementById('ch-code-input').addEventListener('focus',()=>{
  document.getElementById('ch-enter-error').style.color='var(--accent)';
});

document.getElementById('btn-load-code').addEventListener('click',()=>{
  document.getElementById('ch-code-input').dispatchEvent(new Event('input'));
});

document.getElementById('btn-start-challenge').addEventListener('click',()=>{
  if(!loadedChallengeWord)return;
  closeChallengeModal();
  resetGame(loadedChallengeWord,'challenge');
  setBadge('⚔ challenge','challenge-badge');
  showToast('Challenge loaded — good luck!',2000);
});
document.getElementById('btn-start-challenge').disabled=true;

// ════════════════════════════════════════════════════════
//  THEME & COLOUR BLIND
// ════════════════════════════════════════════════════════
const btnTheme=document.getElementById('btn-theme');
let theme=localStorage.getItem('knuckle_theme')||'dark';
function applyTheme(t){
  theme=t;document.documentElement.dataset.theme=t;
  btnTheme.textContent=t==='dark'?'☀':'☽';
  btnTheme.classList.toggle('active',t==='light');
  localStorage.setItem('knuckle_theme',t);
}
applyTheme(theme);
btnTheme.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

const btnCb=document.getElementById('btn-cb');
let cb=localStorage.getItem('knuckle_cb')==='true';
function applyCb(v){
  cb=v;document.documentElement.dataset.cb=String(v);
  btnCb.classList.toggle('active',v);
  localStorage.setItem('knuckle_cb',String(v));
}
applyCb(cb);
btnCb.addEventListener('click',()=>applyCb(!cb));

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeStats();closeChallengeModal();} });
</script>
</body>
